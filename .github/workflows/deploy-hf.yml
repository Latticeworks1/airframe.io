name: Deploy to HuggingFace Space

on:
  push:
    branches:
      - deploy

jobs:
  sync-hf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://latterworks:${HF_TOKEN}@huggingface.co/spaces/latterworks/airframe.io
          git push hf deploy:main --force
